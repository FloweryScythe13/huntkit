name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Get PR diff
        id: diff
        run: |
          # Fetch the diff between this branch and the base branch
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt
          echo "Diff saved to pr_diff.txt"

      - name: Get existing review comments
        id: prior_comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Fetch comments from this PR that were posted by the review workflow.
          # We filter by a marker in the comment body so we only get our own comments,
          # not comments from other reviewers or the developer themselves.

          PRIOR=$(gh pr view $PR_NUMBER --json comments \\
            --jq '[.comments[] | select(.body | contains("**Claude Code Review**")) | .body] | join("\\n\\n---\\n\\n")')

          # Save to a file to avoid shell escaping issues with multi-line strings
          echo "$PRIOR" > prior_comments.txt

          # Check whether there are any prior comments at all
          if [ -z "$PRIOR" ]; then
            echo "No prior review comments found"
            echo "has_prior=false" >> $GITHUB_OUTPUT
          else
            echo "Found prior review comments"
            echo "has_prior=true" >> $GITHUB_OUTPUT
          fi

      - name: Run Claude review
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DIFF_CONTENT=$(cat pr_diff.txt)
          PRIOR_COMMENTS=$(cat prior_comments.txt)

          # Build the prompt dynamically based on whether there are prior comments.
          # If this is the first review, ask for a full review.
          # If there are prior comments, ask only for new or still-unresolved issues.

          if [ "${{ steps.prior_comments.outputs.has_prior }}" = "true" ]; then
            PROMPT="Review this pull request diff for bugs, security vulnerabilities,
          missing error handling, and violations of our architecture conventions.

          IMPORTANT: The following issues were already reported in a previous review of this PR.
          Only report issues that are NEW (not in the list below) or issues that were previously
          reported but are STILL PRESENT in the current diff. Do not re-report issues that have
          already been fixed.

          PREVIOUSLY REPORTED ISSUES:
          $PRIOR_COMMENTS

          Current PR diff:
          $DIFF_CONTENT"
          else
            PROMPT="Review this pull request diff for bugs, security vulnerabilities,
          missing error handling, and violations of our architecture conventions.
          Focus on real issues, skip style preferences and things the linter handles.

          PR diff:
          $DIFF_CONTENT"
          fi

          claude -p "$PROMPT" \\
            --output-format json \\
            --json-schema .claude/review-schema.json \\
            > review_output.json

      - name: Post findings as PR comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Parse the structured JSON output and post each finding as a comment.
          # jq lets us extract the findings array and loop over each entry.

          SUMMARY=$(cat review_output.json | jq -r '.structured_output.summary')
          FINDINGS=$(cat review_output.json | jq -r '.structured_output.findings[]')

          # Post the overall summary first
          gh pr comment $PR_NUMBER --body "**Claude Code Review**

          $SUMMARY"

          # Post each finding as a separate comment
          cat review_output.json | jq -c '.structured_output.findings[]' | while read finding; do
            FILE=$(echo $finding | jq -r '.file')
            SEVERITY=$(echo $finding | jq -r '.severity')
            CATEGORY=$(echo $finding | jq -r '.category')
            DESCRIPTION=$(echo $finding | jq -r '.description')
            SUGGESTION=$(echo $finding | jq -r '.suggestion')
            LINE=$(echo $finding | jq -r '.line // "N/A"')

            gh pr comment $PR_NUMBER --body "**[$SEVERITY] $CATEGORY**, \`$FILE\` (line $LINE)

          $DESCRIPTION

          **Suggested fix:** $SUGGESTION"
          done
